<title>Prime Axis — Property Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4f8;
  --surface:#ffffff;
  --surface2:#f7f9fc;
  --border:#dde3ed;
  --border2:#e8edf5;
  --text:#1a2236;
  --muted:#7a8aaa;
  --sub:#4a5872;
  --accent:#1d4ed8;
  --accent-light:#eff4ff;
  --accent-hover:#1741c0;
  --green:#0e9f6e;
  --green-light:#ecfdf5;
  --yellow:#d97706;
  --yellow-light:#fffbeb;
  --red:#dc2626;
  --red-light:#fef2f2;
  --purple:#7c3aed;
  --purple-light:#f5f3ff;
  --shadow:0 1px 4px rgba(30,50,100,.08),0 4px 16px rgba(30,50,100,.06);
  --shadow-sm:0 1px 3px rgba(30,50,100,.07);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',sans-serif;font-size:15px;line-height:1.5}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#c5cfe0;border-radius:4px}

/* ── Buttons ── */
.btn{cursor:pointer;border:none;border-radius:9px;font-family:inherit;font-size:14px;font-weight:600;padding:9px 18px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,78,216,.3)}
.btn-ghost{background:var(--surface);border:1.5px solid var(--border);color:var(--sub)}.btn-ghost:hover{border-color:#a0b0cc;color:var(--text);background:#f5f8ff}
.btn-danger{background:var(--red-light);border:1.5px solid #fca5a5;color:var(--red)}.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--green-light);border:1.5px solid #6ee7b7;color:var(--green)}.btn-success:hover{background:#d1fae5}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:7px}

/* ── Inputs ── */
input,select,textarea{background:var(--surface);border:1.5px solid var(--border);color:var(--text);border-radius:9px;padding:11px 14px;font-family:inherit;font-size:14px;width:100%;outline:none;transition:border-color .15s;box-shadow:var(--shadow-sm)}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(29,78,216,.1)}
input::placeholder{color:#b0bed4}
select option{background:var(--surface);color:var(--text)}

/* ── Cards ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm)}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}

/* ── Filter buttons ── */
.fb{cursor:pointer;padding:6px 15px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:inherit;transition:all .15s}
.fb.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(29,78,216,.2)}.fb:not(.on):hover{border-color:#a0b0cc;color:var(--sub);background:#f5f8ff}

/* ── Overlay / Modal ── */
.overlay{position:fixed;inset:0;background:rgba(15,25,50,.45);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:28px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(15,25,50,.18)}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:500;display:none;animation:up .3s ease;box-shadow:0 4px 16px rgba(29,78,216,.3)}
@keyframes up{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Progress bar ── */
.pb{height:5px;background:var(--border2);border-radius:3px;overflow:hidden;margin-top:10px}
.pf{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}

/* ── Login ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#e8eef8 0%,#f0f4f8 50%,#e8f0ff 100%)}
.login-box{width:100%;max-width:400px}
.login-card{background:var(--surface);border-radius:20px;padding:36px 32px;box-shadow:0 8px 40px rgba(15,25,50,.14);border:1.5px solid var(--border2)}

/* ── App shell ── */
#app{display:none;flex-direction:column;min-height:100vh}

/* ── Header ── */
#header{background:var(--surface);border-bottom:1.5px solid var(--border);padding:14px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(30,50,100,.06)}

/* ── Tabs ── */
#tabs{background:var(--surface);border-bottom:1.5px solid var(--border);padding:0 22px;display:flex;gap:2px;overflow-x:auto;position:sticky;top:61px;z-index:99}
.tab-btn{cursor:pointer;padding:12px 20px;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.02em;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}.tab-btn:hover:not(.on){color:var(--sub);background:var(--accent-light);border-radius:8px 8px 0 0}

/* ── Content ── */
#content{padding:22px;flex:1}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{padding:18px 20px}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.stat-val{font-family:'Manrope',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-sub{font-size:12px;color:var(--muted);margin-top:5px;font-weight:500}

/* ── Alert banners ── */
.alert{border-radius:10px;padding:11px 16px;font-size:13px;font-weight:500;margin-bottom:10px;cursor:default;display:flex;align-items:center;gap:8px}

/* ── Table rows ── */
.row-hdr,.data-row{display:grid;gap:12px;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border2)}
.row-hdr{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--surface2);border-bottom-color:var(--border)}
.data-row:last-child{border-bottom:none}.data-row:hover{background:var(--accent-light)}
.data-row{cursor:pointer;transition:background .12s}

/* ── Image viewer ── */
#img-viewer{position:fixed;inset:0;background:rgba(10,15,30,.9);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#img-viewer img{max-width:100%;max-height:78vh;border-radius:12px;object-fit:contain;border:2px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,.4)}

/* ── Upload area ── */
.upload-area{border:2px dashed var(--border);border-radius:12px;padding:26px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.upload-area:hover{border-color:var(--accent);background:var(--accent-light)}
.check-thumb{width:100%;height:160px;object-fit:cover;border-radius:10px;border:1.5px solid var(--border);display:block;cursor:pointer;box-shadow:var(--shadow-sm)}

/* ── Section label ── */
.sl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}

/* ── Divider ── */
.divider{height:1px;background:var(--border2);margin:16px 0}

/* ── Contract doc list ── */
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:10px;border:1px solid var(--border2);margin-bottom:8px}
.doc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-icon.pdf{background:#fef2f2;color:#dc2626}
.doc-icon.img{background:#eff4ff;color:#1d4ed8}
.doc-icon.other{background:#f5f3ff;color:#7c3aed}

/* ── PWA install banner ── */
#install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--accent);color:#fff;padding:14px 20px;z-index:800;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(29,78,216,.25)}
#install-banner button{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:7px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
#install-banner button.dismiss{background:transparent;border-color:rgba(255,255,255,.2);padding:7px 12px}

/* ── Mobile bottom nav ── */
@media(max-width:640px){
  #bottom-nav{display:flex}
  #tabs{display:none}
  #content{padding-bottom:80px}
}
@media(min-width:641px){
  #bottom-nav{display:none}
}
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1.5px solid var(--border);z-index:90;justify-content:space-around;padding:8px 0 env(safe-area-inset-bottom,0);box-shadow:0 -2px 12px rgba(30,50,100,.08)}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;cursor:pointer;border:none;background:transparent;font-family:inherit;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.04em;transition:color .15s;min-width:60px}
.bnav-btn.on{color:var(--accent)}
.bnav-btn span.icon{font-size:20px;line-height:1}

/* ── Mobile ── */
@media(max-width:640px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .hide-xs{display:none!important}
  #header{padding:12px 16px}
  #content{padding:14px 16px}
  .modal{padding:22px 18px}
  #tabs{top:57px}
}
@media(max-width:420px){
  .stat-val{font-size:22px}
  .btn{font-size:13px;padding:8px 14px}
}
</style>
<style>
/* ── Firebase sync indicator ── */
#sync-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--accent);z-index:1000;display:none;transform-origin:left;animation:syncpulse 1.2s ease-in-out infinite}
@keyframes syncpulse{0%{opacity:.4;transform:scaleX(.3)}50%{opacity:1;transform:scaleX(.7)}100%{opacity:.4;transform:scaleX(1)}}
#cloud-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:12px;margin-left:6px;vertical-align:middle}
#cloud-status.online{color:var(--green);background:var(--green-light)}
#cloud-status.offline{color:var(--muted);background:var(--surface2)}
#cloud-status.syncing{color:var(--accent);background:var(--accent-light)}
#cloud-status.error{color:var(--red);background:var(--red-light)}
</style>
</head>
<body>

<!-- ══════════════════ LOGIN SCREEN ══════════════════ -->

    <!-- Logo above card -->

<script>

// ══════════════════════════════════════════════════════
const USERS_KEY = 'primeaxis_users_v1';
let USERS = {};

function loadUsers() {
  try {
    const raw = localStorage.getItem(USERS_KEY);
    if (raw) { USERS = JSON.parse(raw); return; }
  } catch(e){}
  USERS = {
    admin: { password: 'admin123', role: 'admin', label: 'Admin' },
    staff: { password: 'staff123', role: 'staff', label: 'Staff' },
  };
  saveUsers();
}
function saveUsers() {
  try { localStorage.setItem(USERS_KEY, JSON.stringify(USERS)); } catch(e){}
}

const TODAY = new Date(); TODAY.setHours(0,0,0,0); // always today's real date, midnight local time
const STORAGE_KEY = 'primeaxis_v4';

// ── Seed data uses real current date offsets ─────────
function _seedDate(monthOffset, day) {
  const d = new Date(); d.setDate(day || 1);
  d.setMonth(d.getMonth() + monthOffset);
  return d.toISOString().slice(0,10);
}
const SEED_TENANTS = [
  {id:1,name:'Juan dela Cruz',   unit:'1A',rent:18500,dueDate:1,lastPaid:_seedDate(-1,1), checkStatus:'deposited',   phone:'0917-555-0101',email:'j.delacruz@email.com', leaseStart:_seedDate(-7,1), leaseEnd:_seedDate(5,30),  contractDocs:[]},
  {id:2,name:'Maria Santos',     unit:'1B',rent:16500,dueDate:1,lastPaid:_seedDate(-1,3), checkStatus:'pending',      phone:'0917-555-0102',email:'m.santos@email.com',   leaseStart:_seedDate(-4,1), leaseEnd:_seedDate(8,31),  contractDocs:[]},

}

// ── Real-time listener: Firestore → local ──────────────
let _unsubTenants = null, _unsubPdcs = null;
function startRealtimeSync() {
  if (!_firebaseReady) return;
  // Listen to tenants collection
  _unsubTenants = _fsdb.collection('tenants').onSnapshot(snap => {
    const tenants = snap.docs.map(d => ({id: d.id, ...d.data()}))
      .map(t => ({...t, contractDocs: t.contractDocs||[]}));
    if (tenants.length > 0 || db.tenants.length === 0) {
      db.tenants = tenants;
      saveLocalCache();
      if (activeTab === 0) renderTab();
    }
    setCloudStatus('online','☁ Cloud synced');
  }, err => {
    console.warn('Tenant listener error:', err);
    setCloudStatus('error','☁ Sync error');
  });
  // Listen to pdcs collection
  _unsubPdcs = _fsdb.collection('pdcs').onSnapshot(snap => {
    const pdcs = snap.docs.map(d => ({id: d.id, ...d.data()}))
      .map(p => ({...p, checkImages: p.checkImages||[]}));
    if (pdcs.length > 0 || db.pdcs.length === 0) {
      db.pdcs = pdcs;
      saveLocalCache();
      if (activeTab === 1) renderTab();
    }
  }, err => console.warn('PDC listener error:', err));
}

// ── saveDB: write to Firestore (with IDB cache fallback) ─
async function saveDB() {
  saveLocalCache(); // always save locally first (instant)
  if (!_firebaseReady) return;
  showSyncBar(true);
  setCloudStatus('syncing','☁ Syncing…');
  try {
    const batch = _fsdb.batch();
    // Write all tenants
    db.tenants.forEach(t => {
      const ref = _fsdb.collection('tenants').doc(String(t.id));
      batch.set(ref, sanitizeForFirestore(t));
    });
    // Write all PDCs
    db.pdcs.forEach(p => {
      const ref = _fsdb.collection('pdcs').doc(String(p.id));
      batch.set(ref, sanitizeForFirestore(p));
    });
    await batch.commit();
    setCloudStatus('online','☁ Cloud synced');
  } catch(e) {
    console.warn('Firestore save failed:', e);
    setCloudStatus('error','☁ Save failed');
  } finally {
    showSyncBar(false);
  }
}

// Remove undefined values Firestore rejects
function sanitizeForFirestore(obj) {
  return JSON.parse(JSON.stringify(obj, (k,v) => v === undefined ? null : v));
}

// ── loadDB: try Firestore first, fallback to IDB cache ──
async function loadDB() {
  // Always try local cache first for instant load
  try {
    const cached = await idbGet('data', 'main');
    if (cached) {
      db = cached;
      db.pdcs    = (db.pdcs||[]).map(p => ({...p, checkImages: p.checkImages||[]}));
      db.tenants = (db.tenants||[]).map(t => ({...t, contractDocs: t.contractDocs||[]}));
    }
  } catch(e) {}

  if (!_firebaseReady) {
    if (!db.tenants || !db.tenants.length) {
      db = { tenants: [], pdcs: [] };
      saveLocalCache();
    }
    return;
  }

  // Fetch from Firestore
  try {
    setCloudStatus('syncing','☁ Loading…');
    const [tSnap, pSnap] = await Promise.all([
      _fsdb.collection('tenants').get(),
      _fsdb.collection('pdcs').get()
    ]);
    const cloudTenants = tSnap.docs.map(d => ({...d.data(), id: d.id}));
    const cloudPdcs    = pSnap.docs.map(d => ({...d.data(), id: d.id}));

    if (cloudTenants.length > 0) {
      db.tenants = cloudTenants.map(t => ({...t, contractDocs: t.contractDocs||[]}));
      db.pdcs    = cloudPdcs.map(p => ({...p, checkImages: p.checkImages||[]}));
    } else {
      // First-time: seed to Firestore
      db = { tenants: [], pdcs: [] };
      await saveDB();
    }
    saveLocalCache();
    setCloudStatus('online','☁ Cloud synced');
  } catch(e) {
    console.warn('Firestore load failed, using cache:', e);
    setCloudStatus('offline','☁ Offline mode');
    if (!db.tenants || !db.tenants.length) {
      db = { tenants: [], pdcs: [] };
    }
  }
}

// ── IDB local cache (offline fallback) ─────────────────
const IDB_NAME    = 'PrimeAxisDB';
const IDB_VERSION = 2;
let _idb = null;

function openIDB() {
  return new Promise((resolve, reject) => {
    if (_idb) { resolve(_idb); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = e => {
      const idb = e.target.result;
      if (!idb.objectStoreNames.contains('data'))  idb.createObjectStore('data');
      if (!idb.objectStoreNames.contains('files')) idb.createObjectStore('files');
    };
    req.onsuccess = e => { _idb = e.target.result; resolve(_idb); };
    req.onerror   = e => reject(e.target.error);
  });
}
function idbGet(store, key) {
  return openIDB().then(idb => new Promise((res, rej) => {
    const req = idb.transaction(store,'readonly').objectStore(store).get(key);
    req.onsuccess = () => res(req.result); req.onerror = () => rej(req.error);
  }));
}
function idbPut(store, key, value) {
  return openIDB().then(idb => new Promise((res, rej) => {
    const req = idb.transaction(store,'readwrite').objectStore(store).put(value, key);
    req.onsuccess = () => res(); req.onerror = () => rej(req.error);
  }));
}
function idbDelete(store, key) {
  return openIDB().then(idb => new Promise((res, rej) => {
    const req = idb.transaction(store,'readwrite').objectStore(store).delete(key);
    req.onsuccess = () => res(); req.onerror = () => rej(req.error);
  }));
}
function saveLocalCache() {
  idbPut('data', 'main', JSON.parse(JSON.stringify(db))).catch(()=>{});
}

// ── File storage: Firebase Storage + IDB fallback ──────
async function saveFile(fileId, blob) {
  // Always cache locally first
  await idbPut('files', fileId, blob).catch(()=>{});
  // Upload to Firebase Storage if available
  if (_firebaseReady) {
    try {
      const ref = _fstore.ref('files/' + fileId);
      await ref.put(blob);
    } catch(e) {
      console.warn('Firebase Storage upload failed, kept in IDB:', e);
    }
  }
}

async function getFileURL(fileId) {
  // Try Firebase Storage first if online
  if (_firebaseReady && navigator.onLine) {
    try {
      const url = await _fstore.ref('files/' + fileId).getDownloadURL();
      return url;
    } catch(e) {
      // Fall through to local cache
    }
  }
  // Local IDB fallback
  const blob = await idbGet('files', fileId).catch(()=>null);
  if (blob) return URL.createObjectURL(blob);
  return null;
}

async function deleteFile(fileId) {
  idbDelete('files', fileId).catch(()=>{});
  if (_firebaseReady) {
    try { await _fstore.ref('files/' + fileId).delete(); } catch(e){}
  }
}

// ── Helpers ────────────────────────────────────────────
function peso(n) { return '₱' + Number(n).toLocaleString(); }
function today() {
  // Always returns today's real local date as YYYY-MM-DD
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysUntilDue(dueDate, lastPaid) {
  if (!lastPaid) return -999;    //if new client, no lastPaid entry
  // Find the NEXT due date on or after today, rolling month by month.
  // Example: dueDate=1, lastPaid=2025-04-01, today=2025-05-22
  //   → next = 2025-05-01 → still past → roll to 2025-06-01 → +10 days
  const now  = new Date(TODAY);
  const paid = new Date(lastPaid);
  // Start from 1 month after lastPaid on the dueDate day
  const next = new Date(paid.getFullYear(), paid.getMonth() + 1, dueDate);
  // Roll forward until it is today or in the future
  while (next < now) {
    next.setMonth(next.getMonth() + 1);
  }
  return Math.ceil((next - now) / 86400000);
}
function pdcBadge(checkDate, status) {
  const diff = Math.ceil((new Date(checkDate) - TODAY) / 86400000);
  if (status==='deposited') return {l:'Deposited',             c:var_green,  bg:var_green_l, i:'✓'};
  if (status==='bounced')   return {l:'Bounced',               c:var_red,    bg:var_red_l,   i:'✕'};
  if (status==='cancelled') return {l:'Cancelled',             c:'#6b7280',  bg:'#f3f4f6',   i:'—'};
  if (diff < 0)             return {l:Math.abs(diff)+'d over', c:var_red,    bg:var_red_l,   i:'⚠'};
  if (diff===0)             return {l:'Due TODAY',             c:var_yellow, bg:var_yellow_l,i:'🔔'};
  if (diff<=7)              return {l:'In '+diff+'d',          c:var_yellow, bg:var_yellow_l,i:'⏰'};
  return                          {l:'In '+diff+'d',           c:var_purple, bg:var_purple_l,i:'📅'};
}

function stats() {
  const T=db.tenants, P=db.pdcs;
  const overdue   = T.filter(t=>daysUntilDue(t.dueDate,t.lastPaid)<0).length;
  const dueSoon   = T.filter(t=>{const d=daysUntilDue(t.dueDate,t.lastPaid);return d>=0&&d<=5;}).length;
  const deposited = T.filter(t=>t.checkStatus==='deposited').length;
  const totalRent = T.reduce((s,t)=>s+t.rent,0);
  const collectedRent = T.filter(t=>t.checkStatus==='deposited').reduce((s,t)=>s+t.rent,0);
  const holding   = P.filter(p=>p.status==='holding');
  const pdcReady  = holding.filter(p=>new Date(p.checkDate)<=TODAY).length;
  const pdcSoon   = holding.filter(p=>{const d=Math.ceil((new Date(p.checkDate)-TODAY)/86400000);return d>0&&d<=7;}).length;
  const pdcBounced= P.filter(p=>p.status==='bounced').length;
  const pdcHeldAmt= holding.reduce((s,p)=>s+p.amount,0);
  const withImage = P.filter(p=>(p.checkImages||[]).length > 0).length;
  const missingImages = holding.filter(p=>!(p.checkImages||[]).length).length;
  return {overdue,dueSoon,deposited,totalRent,collectedRent,pdcHeld:holding.length,pdcReady,pdcSoon,pdcBounced,pdcHeldAmt,withImage,missingImages,total:T.length,pdcTotal:P.length};
}

  const filters = [
    {k:'all',l:`All (${db.tenants.length})`},{k:'overdue',l:`Overdue (${S.overdue})`},
    {k:'due_soon',l:`Due Soon (${S.dueSoon})`},{k:'not_received',l:'Not Received'},{k:'pending',l:'Pending'}
  ];

  <div class="stat-grid">

    ${statCard('Due Soon',       S.dueSoon,            'within 5 days',                var_yellow)}

    ${S.pdcBounced>0?`<div class="alert" style="background:var(--red-light);border:1.5px solid #fca5a5;color:var(--red)">✕ ${S.pdcBounced} bounced check${S.pdcBounced>1?'s':''} — follow up needed</div>`:''}
    ${S.missingImages>0?`<div class="alert" style="background:var(--yellow-light);border:1.5px solid #fcd34d;color:var(--yellow);cursor:pointer" onclick="switchTab(1);pdcFilter='no_image';renderTab()">📷 ${S.missingImages} check${S.missingImages>1?'s':''} missing images →</div>`:''}
  </div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:16px">
    <span style="font-size:12px;color:var(--muted);font-weight:600">Filter:</span>
    ${filters.map(f=>`<button class="fb ${tenantFilter===f.k?'on':''}" onclick="tenantFilter='${f.k}';renderTenants()">${f.l}</button>`).join('')}

    <div class="row-hdr" style="grid-template-columns:58px 1fr 100px 120px 130px">
      <div>Unit</div><div>Tenant</div><div class="hide-xs">Rent</div><div>Due Status</div><div>Check Status</div>

function markRent(id, status) {
  const t = db.tenants.find(x=>x.id===id);
  if (!t) return;
  t.checkStatus = status;
  if (status==='deposited') t.lastPaid = today();
  saveDB(); renderTab(); toast('Rent status updated!');
}

function deleteTenant(id) {
  if (!isAdmin()) { toast('Only administrators can delete tenants.', true); return; }
  if (!confirm('Remove this tenant? This cannot be undone.')) return;
  const removedPdcs = db.pdcs.filter(p=>p.tenantId===id);
  db.tenants = db.tenants.filter(t=>t.id!==id);
  db.pdcs    = db.pdcs.filter(p=>p.tenantId!==id);
  firestoreDelete('tenants', id);
  removedPdcs.forEach(p => firestoreDelete('pdcs', p.id));
  saveDB(); closeModal('modal-tenant-detail'); renderTab(); toast('Tenant removed.');
}

function doAddTenant() {
  const name=v('at-name'),unit=v('at-unit'),rent=+v('at-rent'),due=+v('at-due');
  if(!name||!unit||!rent){toast('Name, unit and rent are required.',true);return;}
    const ls = v('at-start');
  const initLastPaid = ls || today().slice(0,7)+'-01';
  db.tenants.push({id:nextId(db.tenants),name,unit,rent,dueDate:due||1,lastPaid:initLastPaid,checkStatus:'not_received',phone:v('at-phone'),email:v('at-email'),leaseStart:ls,leaseEnd:v('at-lease'),contractDocs:[]});
  saveDB(); closeModal('modal-add-tenant'); renderTab(); toast('Tenant added!');
}

function renderPDCs() {
  const S = stats();
  let pdcs = [...db.pdcs];
  if (pdcFilter==='ready')      pdcs=pdcs.filter(p=>p.status==='holding'&&new Date(p.checkDate)<=TODAY);
  else if(pdcFilter==='soon')   pdcs=pdcs.filter(p=>{const d=Math.ceil((new Date(p.checkDate)-TODAY)/86400000);return p.status==='holding'&&d>0&&d<=7;});
  else if(pdcFilter==='holding')pdcs=pdcs.filter(p=>p.status==='holding'&&new Date(p.checkDate)>TODAY);
  else if(pdcFilter==='deposited') pdcs=pdcs.filter(p=>p.status==='deposited');
  else if(pdcFilter==='bounced')   pdcs=pdcs.filter(p=>p.status==='bounced');
  else if(pdcFilter==='no_image')  pdcs=pdcs.filter((p=>!p.checkImages || p.checkImages.length === 0)&&p.status==='holding');
  if(pdcSort==='date')   pdcs.sort((a,b)=>new Date(a.checkDate)-new Date(b.checkDate));
  if(pdcSort==='amount') pdcs.sort((a,b)=>b.amount-a.amount);
  if(pdcSort==='tenant') pdcs.sort((a,b)=>a.tenantName.localeCompare(b.tenantName));

  const filters=[
    {k:'all',l:`All (${db.pdcs.length})`},{k:'ready',l:`Ready (${S.pdcReady})`},{k:'soon',l:`Soon (${S.pdcSoon})`},
    {k:'holding',l:'Holding'},{k:'deposited',l:'Deposited'},{k:'bounced',l:'Bounced'},{k:'no_image',l:`No Image (${S.missingImages})`}
  ];
  const sorts=[{k:'date',l:'Date'},{k:'tenant',l:'Tenant'},{k:'amount',l:'Amount'}];

  let html = `
  <div class="stat-grid">
    ${statCard('Checks Held',      S.pdcHeld,                 'currently holding',  var_purple)}
    ${statCard('Ready to Deposit', S.pdcReady,                'date has been reached', var_accent)}
    ${statCard('Images Uploaded',  S.withImage+' / '+S.pdcTotal,'of all checks',    var_green)}
    ${statCard('Total Held Value', peso(S.pdcHeldAmt),        'across all tenants', var_yellow)}
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">
    ${S.pdcReady>0?`<div class="alert" style="background:var(--accent-light);border:1.5px solid #bfcfef;color:var(--accent)">🔔 ${S.pdcReady} check${S.pdcReady>1?'s are':' is'} ready to deposit now.</div>`:''}
    ${S.missingImages>0?`<div class="alert" style="background:var(--yellow-light);border:1.5px solid #fcd34d;color:var(--yellow)">📷 ${S.missingImages} check${S.missingImages>1?'s are':' is'} still missing an image.</div>`:''}
    ${S.pdcBounced>0?`<div class="alert" style="background:var(--red-light);border:1.5px solid #fca5a5;color:var(--red)">✕ ${S.pdcBounced} bounced check${S.pdcBounced>1?'s':''} need follow-up.</div>`:''}
  </div>
  <div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-bottom:16px">

function markPdc(id, status) {
  const p = db.pdcs.find(x=>x.id===id);
  if (!p) return;
  p.status = status;
  if (status==='deposited') p.depositedDate = today();
  saveDB(); renderTab();
  toast(status==='deposited'?'✓ Check marked as deposited!':status==='bounced'?'⚠ Marked as bounced.':'Check updated.');
}

function uploadPdcImage(pdcId, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const p = db.pdcs.find(x => x.id === pdcId);
  if (!p) return;
  if (!p.checkImages) p.checkImages = [];

  let done = 0;
  files.forEach(file => {
    const ext    = file.name.split('.').pop().toLowerCase();
    const imgExts = ['jpg','jpeg','png','gif','webp'];
    const type   = imgExts.includes(ext) ? 'img' : 'other';
    const size   = file.size > 1024*1024
      ? (file.size/1024/1024).toFixed(1)+' MB'
      : (file.size/1024).toFixed(1)+' KB';

  if (file.type.startsWith('image/')) {
  compressImage(file).then(compressed => {
    fileToBase64(compressed).then(base64 => {
      
      const size = file.size > 1024*1024
        ? (file.size/1024/1024).toFixed(1)+' MB'
        : (file.size/1024).toFixed(1)+' KB';

      p.checkImages.push({
        id: Date.now(),
        name: file.name,
        type,
        size,
        base64: base64,   
        uploaded: new Date().toISOString().slice(0,10)
      });

      done++;

      if (done === files.length) {
        saveDB();
        renderTab();
        toast('✓ images saved!');
      }
    });
  });
  } else {
    fileToBase64(file).then(base64 => {

      p.checkImages.push({
        id: Date.now(),
        name: file.name,
        type,
        size,
        base64: base64,   
        uploaded: new Date().toISOString().slice(0,10)
      });

      done++;

      if (done === files.length) {
        saveDB();
        renderTab();
        toast('✓ images saved!');
      }
    });
  }
  });
  input.value = '';
}

function deleteCheckImage(pdcId, fileId) {
  const p = db.pdcs.find(x => x.id === pdcId);
  if (!p) return;
  if (!confirm('Delete this check image?')) return;
  p.checkImages = (p.checkImages || []).filter(img => img.id !== fileId);
  deleteFile(fileId);
  saveDB();
  renderTab();
  toast('Check image deleted.');
}

let _newPdcImage = null;
let _newPdcFile = null; // stores actual File object for IDB
function previewNewPdcImg(input) {
  const file = input.files[0]; if(!file) return;
  _newPdcFile = file; // store for IDB on save
  const reader = new FileReader();
  reader.onload = ev => {
    _newPdcImage = ev.target.result;
    document.getElementById('ap-img-preview').innerHTML = `
    <img src="${_newPdcImage}" style="width:100%;height:150px;object-fit:cover;border-radius:10px;border:1.5px solid var(--border);margin-bottom:10px;box-shadow:var(--shadow-sm)"/>
    <div style="display:flex;gap:8px">

      <label class="btn btn-ghost btn-sm" style="flex:1;justify-content:center;cursor:pointer">↺ Replace<input type="file" accept="image/*" capture="environment" style="display:none" onchange="previewNewPdcImg(this)"/></label>
      <button class="btn btn-danger btn-sm" onclick="_newPdcImage=null;document.getElementById('ap-img-preview').innerHTML=resetImgUpload()">✕</button>
    </div>`;
  };
  reader.readAsDataURL(file);
}
function resetImgUpload(){
  return `<label class="upload-area" style="display:block"><div style="font-size:28px;margin-bottom:8px">📷</div><div style="color:var(--sub);font-size:14px;font-weight:600">Tap to attach check image</div><input type="file" accept="image/*" capture="environment" style="display:none" onchange="previewNewPdcImg(this)"/></label>`;
}
function doAddPdc() {
  const tenantId=+v('ap-tenant'),checkNo=v('ap-checkno'),amount=+v('ap-amount'),checkDate=v('ap-date');
  if(!tenantId||!checkNo||!amount||!checkDate){toast('Tenant, check #, amount and date are required.',true);return;}
  const tenant=db.tenants.find(t=>t.id===tenantId); if(!tenant) return;
  const newPdc = {id:nextId(db.pdcs),tenantId,tenantName:tenant.name,unit:tenant.unit,checkNo,amount,checkDate,receivedDate:v('ap-recv'),bank:v('ap-bank'),memo:v('ap-memo'),status:'holding',checkImages:[]};
  // If an image was previewed during add, save it
  if (_newPdcFile) {
    const fileId = makeFileId('chk_' + newPdc.id);
    const ext = _newPdcFile.name.split('.').pop().toLowerCase();
    const imgExts = ['jpg','jpeg','png','gif','webp'];
    const type = imgExts.includes(ext) ? 'img' : 'other';
    const size = _newPdcFile.size > 1024*1024 ? (_newPdcFile.size/1024/1024).toFixed(1)+' MB' : (_newPdcFile.size/1024).toFixed(1)+' KB';
    saveFile(fileId, _newPdcFile).then(() => {
      newPdc.checkImages.push({id:fileId,name:_newPdcFile.name,type,size,mimeType:_newPdcFile.type,uploaded:today()});
    });
  }
  db.pdcs.push(newPdc);
  _newPdcImage=null; _newPdcFile=null;
  saveDB();
  closeModal('modal-add-pdc');
  // Auto-navigate to the Post-Dated Checks tab so user sees it immediately
  switchTab(1);
  toast('✓ Post-dated check added!');
}

function doAddUser() {
  const label    = v('au-label');
  const username = v('au-username').toLowerCase();
  const pass     = v('au-pass');
  const pass2    = v('au-pass2');
  const role     = v('au-role');
  if (!label || !username) { toast('Name and username are required.', true); return; }
  if (!/^[a-z0-9_]+$/.test(username)) { toast('Username: letters, numbers and underscores only.', true); return; }
  if (USERS[username]) { toast('Username "' + username + '" already exists.', true); return; }
  if (pass.length < 4) { toast('Password must be at least 4 characters.', true); return; }
  if (pass !== pass2) { toast('Passwords do not match.', true); return; }
  USERS[username] = { password: pass, role, label };
  saveUsers();
  closeModal('modal-add-user');
  renderSettings();
  toast('✓ Account "' + username + '" created as ' + (role === 'admin' ? 'Admin' : 'Staff') + '!');
}

// ── Delete User ────────────────────────────────────────
function deleteUser(username) {
  if (!isAdmin()) { toast('Admin access required.', true); return; }
  const u = USERS[username];
  if (!u) return;
  if (username === currentUser.email) { toast('You cannot delete your own account.', true); return; }
  const adminCount = Object.values(USERS).filter(d => d.role === 'admin').length;
  if (u.role === 'admin' && adminCount <= 1) { toast('Cannot delete the last admin account.', true); return; }
  if (!confirm('Delete user "' + u.label + '" (@' + username + ')? This cannot be undone.')) return;
  delete USERS[username];
  saveUsers();
  renderSettings();
  toast('User "' + username + '" deleted.');
}

function uploadContract(tenantId, input) {
  const tenant = db.tenants.find(t => t.id === tenantId);
  if (!tenant) return;
  if (!tenant.contractDocs) tenant.contractDocs = [];
  const files = Array.from(input.files);
  if (!files.length) return;
  let done = 0;

  files.forEach(file => {
    const fileId  = makeFileId('doc_' + tenantId);
    const ext     = file.name.split('.').pop().toLowerCase();
    const imgExts = ['jpg','jpeg','png','gif','webp'];
    const type    = ext === 'pdf' ? 'pdf' : imgExts.includes(ext) ? 'img' : 'other';
    const size    = file.size > 1024*1024
      ? (file.size/1024/1024).toFixed(1)+' MB'
      : (file.size/1024).toFixed(1)+' KB';

if (file.type.startsWith('image/')) {
  compressImage(file).then(compressed => {
    fileToBase64(compressed).then(base64 => {
	
      const size = file.size > 1024*1024
        ? (file.size/1024/1024).toFixed(1)+' MB'
        : (file.size/1024).toFixed(1)+' KB';
	
      tenant.contractDocs.push({
        id: Date.now(),
        name: file.name,
        type,
        size,
        base64: base64,
        uploaded: new Date().toISOString().slice(0,10)
      });

      done++;

      if (done === files.length) {
        saveDB();
        openTenantDetail(tenantId);
        toast('✓ uploaded!');
      }
    });
  });
} else {
    fileToBase64(file).then(base64 => {
      tenant.contractDocs.push({
        id: Date.now(),
        name: file.name,
        type,
        size,
        base64: base64,
        uploaded: new Date().toISOString().slice(0,10)
      });

      done++;

      if (done === files.length) {
        saveDB();
        openTenantDetail(tenantId);
        toast('✓ uploaded!');
      }
    });
}

  });
  input.value = '';
}

let _deferredInstallPrompt = null;

function setupPWA() {
  // Inject inline manifest
  const manifest = {
    name: 'Prime Axis',
    short_name: 'Prime Axis',
    description: 'Property Management System',
    start_url: window.location.href,
    display: 'standalone',
    background_color: '#f0f4f8',
    theme_color: '#1d4ed8',
    orientation: 'any',
    icons: [
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231d4ed8"/><text y=".9em" font-size="72" x="50%" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">PA</text></svg>', sizes:'192x192', type:'image/svg+xml'},
      {src:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231d4ed8"/><text y=".9em" font-size="72" x="50%" text-anchor="middle" fill="white" font-family="sans-serif" font-weight="bold">PA</text></svg>', sizes:'512x512', type:'image/svg+xml'},
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  document.getElementById('pwa-manifest').href = url;

  // Register service worker
  if ('serviceWorker' in navigator) {
    const swCode = `
const CACHE = 'primeaxis-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fresh = fetch(e.request).then(res => {
        if (res && res.status===200) {
          const clone = res.clone();
          caches.open(CACHE).then(c=>c.put(e.request,clone));
        }
        return res;
      }).catch(()=>cached);
      return cached || fresh;
    })
  );
});`;
    const swBlob = new Blob([swCode], {type:'application/javascript'});
    const swUrl  = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swUrl).catch(()=>{});
  }

  // Listen for install prompt
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    _deferredInstallPrompt = e;
    // Show banner only if not already installed and not dismissed
    if (!sessionStorage.getItem('pa_install_dismissed')) {
      document.getElementById('install-banner').style.display = 'flex';
    }
  });

  window.addEventListener('appinstalled', () => {
    document.getElementById('install-banner').style.display = 'none';
    _deferredInstallPrompt = null;
    toast('✓ Prime Axis installed on your device!');
  });
}

function installPWA() {
  if (!_deferredInstallPrompt) return;
  _deferredInstallPrompt.prompt();
  _deferredInstallPrompt.userChoice.then(r => {
    if (r.outcome==='accepted') toast('Installing Prime Axis…');
    _deferredInstallPrompt = null;
    document.getElementById('install-banner').style.display='none';
  });
}

function dismissInstall() {
  
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      currentUser = user;
      startApp();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
    }
  });

  document.getElementById('install-banner').style.display='none';
}

});

// ==================================
// Base64 Upgrade
// ==================================

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();

    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;

    reader.readAsDataURL(file);
  });
}

function compressImage(file, maxWidth = 800, quality = 0.7) {
  return new Promise(resolve => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(maxWidth / img.width, 1);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => {
        resolve(blob);
      }, 'image/jpeg', quality);
    };

    reader.readAsDataURL(file);
  });
}
